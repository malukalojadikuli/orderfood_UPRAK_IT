<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopi & Snack - Pesan Sekarang</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <a href="index.html" class="logo-link">☕ Kopi & Snack</a>
            <button class="cart-btn" onclick="showCart()" data-testid="cart-button">
                <span>🛒</span>
                <span class="cart-count" id="cartCount" data-testid="cart-count">0</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Section: Daftar Menu -->
        <section id="menuSection" data-testid="menu-section">
            <h2>Menu Kami</h2>
            <div class="menu-grid" id="menuGrid"></div>
        </section>

        <!-- Section: Keranjang -->
        <section id="cartSection" class="hidden" data-testid="cart-section">
            <div class="section-header">
                <h2>Keranjang Pesanan</h2>
                <button class="btn-back" onclick="showMenu()" data-testid="back-to-menu-button">← Kembali</button>
            </div>

            <div id="cartItems" data-testid="cart-items-container"></div>
            <div id="emptyCart" class="empty-state hidden" data-testid="empty-cart-message">
                <p>Keranjang Anda masih kosong</p>
                <button class="btn-primary" onclick="showMenu()" data-testid="empty-cart-back-button">Mulai Pesan</button>
            </div>

            <div id="cartSummary" class="cart-bar hidden" data-testid="cart-summary">
                <div class="cart-bar-total">
                    <span class="cart-bar-label">Total</span>
                    <span class="cart-bar-price" id="totalPrice" data-testid="total-price">Rp 0</span>
                </div>
                <button class="cart-bar-btn" onclick="showCheckout()" data-testid="proceed-to-checkout-button">
                    Lanjut ke Checkout →
                </button>
            </div>
        </section>

        <!-- Section: Checkout -->
        <section id="checkoutSection" class="hidden" data-testid="checkout-section">
            <div class="section-header">
                <h2>Checkout</h2>
                <button class="btn-back" onclick="showCart()" data-testid="back-to-cart-button">← Kembali</button>
            </div>

            <form id="checkoutForm" onsubmit="confirmOrder(event)" data-testid="checkout-form">
                <div class="form-group">
                    <label for="customerName">Nama Pemesan</label>
                    <input type="text" id="customerName" required placeholder="Masukkan nama Anda" data-testid="customer-name-input">
                </div>

                <div class="form-group">
                    <label for="pickupLocation">Lokasi Pickup</label>
                    <select id="pickupLocation" required data-testid="pickup-location-select">
                        <option value="">Pilih lokasi pickup</option>
                        <option value="Cabang Pusat - Jl. Sudirman No. 123">Cabang Pusat - Jl. Sudirman No. 123</option>
                        <option value="Cabang Kedua - Jl. Boulevard">Cabang Kedua - Jl. Boulevard</option>
                    </select>

                </div>

                <div class="order-summary" data-testid="checkout-order-summary">
                    <h3>Ringkasan Pesanan</h3>
                    <div id="checkoutItems" data-testid="checkout-items-list"></div>
                    <div class="summary-row total">
                        <span>Total Pembayaran</span>
                        <span class="total-price" id="checkoutTotal" data-testid="checkout-total-price">Rp 0</span>
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-full" data-testid="confirm-order-button">Konfirmasi Pesanan</button>
            </form>
        </section>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden" data-testid="toast-notification"></div>

    <script src="js/buyer.js"></script>
</body>
</html>
