<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopi & Snack - Seller Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/seller.css">
</head>
<body class="seller-body">

    <header class="seller-header">
        <div class="container">
            <h1>☕ Kopi & Snack <span class="seller-badge">Seller</span></h1>
            <nav class="seller-nav">
                <button class="nav-btn active" onclick="showPage('ordersPage')" data-page="ordersPage">
                    📋 Pesanan
                    <span class="notif-badge" id="pendingBadge">0</span>
                </button>
                <button class="nav-btn" onclick="showPage('menuPage')" data-page="menuPage">🍽️ Menu</button>
                <button class="nav-btn" onclick="showPage('incomePage')" data-page="incomePage">💰 Pendapatan</button>
            </nav>
        </div>
    </header>

    <main class="container seller-main">

        <!-- ORDERS PAGE -->
        <section id="ordersPage" class="seller-page">
            <div class="page-header">
                <h2>Pesanan Masuk</h2>
            </div>
            <div id="ordersList"></div>
            <div id="ordersEmpty" class="empty-state hidden">
                <p>Belum ada pesanan masuk</p>
            </div>
        </section>

        <!-- MENU PAGE -->
        <section id="menuPage" class="seller-page hidden">
            <div class="page-header">
                <h2>Kelola Menu</h2>
                <button class="btn-add-menu" onclick="openMenuModal(null)">+ Tambah Menu</button>
            </div>
            <div class="menu-manage-grid" id="menuManageList"></div>
        </section>

        <!-- INCOME PAGE -->
        <section id="incomePage" class="seller-page hidden">
            <div class="page-header"><h2>Pendapatan</h2></div>
            <div class="income-cards">
                <div class="income-card">
                    <div class="income-icon">💰</div>
                    <div class="income-info">
                        <span class="income-label">Total Pendapatan</span>
                        <span class="income-value" id="totalIncome">Rp 0</span>
                    </div>
                </div>
                <div class="income-card">
                    <div class="income-icon">📦</div>
                    <div class="income-info">
                        <span class="income-label">Total Pesanan Selesai</span>
                        <span class="income-value" id="totalOrders">0</span>
                    </div>
                </div>
            </div>
            <h3 class="section-subheader">Riwayat Pesanan Selesai</h3>
            <div id="incomeList"></div>
            <div id="incomeEmpty" class="empty-state hidden"><p>Belum ada pesanan selesai</p></div>
        </section>

    </main>

    <div id="toast" class="toast hidden"></div>

    <!-- MENU MODAL -->
    <div id="menuModal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modalTitle">Tambah Menu</h3>
                <button class="modal-close" onclick="closeMenuModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-field">
                    <label>Emoji</label>
                    <input type="text" id="modalEmoji" placeholder="Contoh: ☕ 🥐 🍵" maxlength="4">
                </div>
                <div class="modal-field">
                    <label>Nama Menu</label>
                    <input type="text" id="modalName" placeholder="Nama menu">
                </div>
                <div class="modal-field">
                    <label>Harga (Rp)</label>
                    <input type="number" id="modalPrice" placeholder="Contoh: 25000" min="0">
                </div>
                <div class="modal-field">
                    <label>Kategori</label>
                    <select id="modalCategory">
                        <option value="coffee">☕ Coffee</option>
                        <option value="nonCoffee">🥤 Non-Coffee</option>
                        <option value="snack">🍰 Snack</option>
                        <option value="menu">🍽️ Menu Umum</option>
                    </select>
                </div>
                <div class="modal-field">
                    <label>Stok</label>
                    <input type="number" id="modalStock" placeholder="Contoh: 10" min="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" onclick="closeMenuModal()">Batal</button>
                <button class="btn-modal-save" onclick="saveMenu()">Simpan</button>
            </div>
        </div>
    </div>

    <!-- DELETE CONFIRM MODAL -->
    <div id="deleteModal" class="modal-overlay hidden">
        <div class="modal-card modal-card-sm">
            <div class="modal-header">
                <h3>Hapus Menu?</h3>
                <button class="modal-close" onclick="closeDeleteModal()">✕</button>
            </div>
            <div class="modal-body">
                <p style="color:#6d4c41;font-size:0.95rem;">
                    Menu "<strong id="deleteMenuName"></strong>" akan dihapus permanen dari database.
                </p>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" onclick="closeDeleteModal()">Batal</button>
                <button class="btn-modal-delete" onclick="confirmDelete()">Hapus</button>
            </div>
        </div>
    </div>

    <script src="js/seller.js"></script>
</body>
</html>
